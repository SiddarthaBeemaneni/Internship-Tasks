{% extends "base.html" %}
{% block title %}Sign up — TicketSense{% endblock %}
{% block content %}
<section class="section auth-section">
  <div class="container auth-wrap">
    <div class="card auth-card">
      <div class="eyebrow">Get started</div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Sign up to try the live triage demo and explore the dashboard.</p>

      <form id="signupForm" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" placeholder="Jordan Lee" autocomplete="name" required>
          <span class="field-error" id="err-name"></span>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="jordan@company.com" autocomplete="email" required>
          <span class="field-error" id="err-email"></span>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" required>
            <span class="field-error" id="err-password"></span>
          </div>
          <div class="field">
            <label for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" autocomplete="new-password" required>
            <span class="field-error" id="err-confirm_password"></span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="signupBtn">Create account</button>
        <p class="form-note" id="formStatus" role="alert"></p>
      </form>

      <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
